<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcu ni Haru ❤️</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --card: #f9f9f9;
            --input-bg: #eeeeee;
            --accent: #007bff;
            --danger: #ff4d4d;
        }

        body.dark-mode {
            --bg: #121212;
            --text: #ffffff;
            --card: #1e1e1e;
            --input-bg: #2d2d2d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        .calc-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .settings {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: none;
            color: var(--text);
            text-align: center;
            font-size: 1.2rem;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        button {
            border: none;
            background: var(--input-bg);
            color: var(--text);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .step-btn { width: 40px; height: 44px; font-size: 1.2rem; }
        .step-btn:hover { background: var(--accent); color: white; }

        .ops-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .op-btn { height: 45px; font-weight: bold; }
        .op-btn:hover { background: var(--accent); color: white; }
        
        .clear-btn { background: var(--danger); color: white; }
        .clear-btn:hover { opacity: 0.8; }

        .result-display {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--input-bg);
            text-align: center;
        }

        #total { font-size: 2rem; font-weight: 800; display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: var(--accent);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="settings">
        <label><input type="checkbox" id="themeToggle"> Dark Mode</label>
        <label><input type="checkbox" id="alertToggle"> Alerts</label>
    </div>

    <div class="input-group">
        <button class="step-btn" onclick="step('num1', -1)">-</button>
        <input type="number" id="num1" value="0">
        <button class="step-btn" onclick="step('num1', 1)">+</button>
    </div>

    <div class="input-group">
        <button class="step-btn" onclick="step('num2', -1)">-</button>
        <input type="number" id="num2" value="0">
        <button class="step-btn" onclick="step('num2', 1)">+</button>
    </div>

    <div class="ops-grid">
        <button class="op-btn" onclick="calc('+')">+</button>
        <button class="op-btn" onclick="calc('-')">-</button>
        <button class="op-btn" onclick="calc('*')">×</button>
        <button class="op-btn" onclick="calc('/')">÷</button>
        <button class="op-btn clear-btn" onclick="resetAll()">C</button>
    </div>

    <div class="result-display">
        <small>RESULT</small>
        <span id="total">0</span>
    </div>

    <a href="labs.html" class="back-link">Return to Lab Outputs Section</a>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const alertToggle = document.getElementById('alertToggle');

    themeToggle.addEventListener('change', () => document.body.classList.toggle('dark-mode'));

    function step(id, val) {
        const input = document.getElementById(id);
        input.value = parseInt(input.value || 0) + val;
    }

    function resetAll() {
        document.getElementById('num1').value = 0;
        document.getElementById('num2').value = 0;
        document.getElementById('total').innerText = 0;
    }

    function calc(op) {
        const v1 = parseFloat(document.getElementById('num1').value || 0);
        const v2 = parseFloat(document.getElementById('num2').value || 0);
        let res = 0;

        switch(op) {
            case '+': res = v1 + v2; break;
            case '-': res = v1 - v2; break;
            case '*': res = v1 * v2; break;
            case '/': res = v2 !== 0 ? (v1 / v2) : "Error"; break;
        }

        // Clean up decimal display
        if (typeof res === 'number' && !Number.isInteger(res)) {
            res = res.toFixed(2);
        }

        document.getElementById('total').innerText = res;
        
        if (alertToggle.checked) {
            alert("Calculation: " + res);
        }
    }
</script>

</body>
</html>
